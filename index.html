<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/>
    <title>Vibessoga - Automated Portal</title>
    <style>
        body{ margin:0; font-family:sans-serif; background:#000; color:#fff; text-align:center; }
        .header{ background:#111; padding:15px; border-bottom:2px solid #b026ff; font-size:24px; color:#b026ff; font-weight:bold; }
        
        /* Ad Box Styling */
        #ad-box { background:#1a1a1a; padding:20px; margin:15px; border:1px solid #333; border-radius:12px; min-height: 250px; }
        #timer { font-size:45px; color:#b026ff; font-weight: bold; margin: 10px 0; }
        .wait-text { font-size: 14px; color: #888; }
        
        /* Content Styling (Sheet Data) */
        #content { display:none; padding:15px; }
        .links-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .ep-link { background:#1a1a1a; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #333; }
        .btn { background:#b026ff; color:#fff; padding:8px 18px; border-radius:5px; text-decoration:none; font-weight:bold; box-shadow: 0 4px 10px rgba(176,38,255,0.2); }
        
        .footer { margin-top: 40px; padding: 20px; color: #333; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">VIBESSOGA</div>

<div id="ad-box">
    <span class="wait-text">AD CLOSING IN...</span>
    <div id="timer">30</div>
    
    <div id="ad-unit">
        <script async="async" data-cfasync="false" src="https://pl29046543.profitablecpmratenetwork.com/e4623cc5488489ca88c4255902f9e76c/invoke.js"></script>
        <div id="container-e4623cc5488489ca88c4255902f9e76c"></div>
        </div>
</div>

<div id="content">
    <h3 style="text-align:left; color:#b026ff; margin-left:10px;">Latest Episodes</h3>
    <div id="links-container" class="links-grid">
        Loading Episodes from Google Sheet...
    </div>
</div>

<div class="footer">MHB TOOL CREATOR</div>

<script>
    // TIMER LOGIC
    let timeLeft = 30;
    const timerElement = document.getElementById('timer');
    const adBox = document.getElementById('ad-box');
    const content = document.getElementById('content');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(countdown);
            adBox.style.display = 'none'; // Ad box gayab
            content.style.display = 'block'; // Sheet data show
        }
    }, 1000);

    // GOOGLE SHEET LOGIC (Automated)
    // Apki Sheet ID: 1HvEUUOBzmDi-sEK4UOg1DQTnjtP8RUiZGfJHtq5fZow
    const SHEET_URL = "https://opensheet.elk.sh/1HvEUUOBzmDi-sEK4UOg1DQTnjtP8RUiZGfJHtq5fZow/Sheet1";

    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.json();
            const container = document.getElementById('links-container');
            container.innerHTML = ""; // Clear loading text

            data.forEach(row => {
                // Sheet mein 'Name' aur 'Link' column hona lazmi hai
                if(row.Name && row.Link) {
                    container.innerHTML += `
                        <div class="ep-link">
                            <span>${row.Name}</span>
                            <a href="${row.Link}" class="btn" target="_blank">WATCH NOW</a>
                        </div>`;
                }
            });
        } catch (err) {
            document.getElementById('links-container').innerHTML = "Sheet Connect Nahi Ho Rahi. Share Settings Check Karein.";
        }
    }

    fetchSheetData();
</script>

</body>
</html>
