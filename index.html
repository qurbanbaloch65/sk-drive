<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml'>
<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title>Vibessoga - Tum Se Tum Tak</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000000;
  color:white;
  text-align: center;
}

.header{
  background:#0a0a0a;
  padding:15px;
  border-bottom:1px solid #1f1f1f;
  text-align: left;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#b026ff;
}

.container{
  padding:10px;
}

/* Ad Box and Timer Styling */
#ad-box {
  background:#111;
  padding:20px;
  margin:15px 0;
  border-radius:12px;
  border:1px solid #2a2a2a;
}

#timer {
  font-size:40px;
  font-weight:bold;
  color:#b026ff;
  margin-bottom:10px;
}

.poster{
  width:100%;
  border-radius:12px;
  margin-bottom: 15px;
}

/* Episodes Section (Hidden initially) */
#main-content {
  display: none;
}

.episodes{
  margin-top:15px;
}

.ep{
  background:#111;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #2a2a2a;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-align: left;
}

.btn{
  background:#b026ff;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Vibessoga</div>
</div>

<div class="container">
    
    <div id="ad-box">
        <p style="color:#888; font-size:12px; margin-top:0;">AD CLOSING IN...</p>
        <div id="timer">30</div>
        
        <div id="ad-unit">
            <script async="async" data-cfasync="false" src="https://pl29046543.profitablecpmratenetwork.com/e4623cc5488489ca88c4255902f9e76c/invoke.js"></script>
            <div id="container-e4623cc5488489ca88c4255902f9e76c"></div>
        </div>
    </div>

    <div id="main-content">
        <img class="poster" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Tumm_Se_Tumm_Tak.png/1280px-Tumm_Se_Tumm_Tak.png"/>
        <h3 style="text-align:left;">Episodes</h3>
        <div class="episodes" id="episodeList">
            Loading episodes...
        </div>
    </div>

</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){
  if (e.ctrlKey && (
      e.key === "u" ||
      e.key === "s" ||
      e.key === "i" ||
      e.key === "j"
  )){
    e.preventDefault();
  }
});

document.body.style.userSelect = "none";
</script>

<script>
// Timer Logic
let timeLeft = 30;
const timerDisplay = document.getElementById('timer');
const adBox = document.getElementById('ad-box');
const mainContent = document.getElementById('main-content');

const countdown = setInterval(() => {
    timeLeft--;
    timerDisplay.innerText = timeLeft;
    if(timeLeft <= 0) {
        clearInterval(countdown);
        adBox.style.display = 'none'; // Ad box removed
        mainContent.style.display = 'block'; // Real content shown
    }
}, 1000);

// Google Sheet Logic (Real URL)
const API_URL = "https://opensheet.elk.sh/1HvEUUOBzmDi-sEK4UOg1DQTnjtP8RUiZGfJHtq5fZow/Sheet1";

async function loadEpisodes(){
  try {
    let res = await fetch(API_URL);
    let data = await res.json();

    let box = document.getElementById("episodeList");
    box.innerHTML = "";

    data.forEach(ep => {
      if(ep.Name && ep.Link) {
        box.innerHTML += `
          <div class="ep">
            <span>${ep.Name}</span>
            <a class="btn" href="${ep.Link}" target="_blank">Watch Now</a>
          </div>
        `;
      }
    });

  } catch(err){
    document.getElementById("episodeList").innerText = "Sheet Error!";
    console.log("Error loading sheet", err);
  }
}

loadEpisodes();
</script>

</body>
</html>
